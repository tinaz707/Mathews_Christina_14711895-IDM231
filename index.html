<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your PinkPantheress Song!</title>
</head>
<body>
    <main>
        <div class="Intro-Text">
            <h1>Which <span class="pump-demi">PinkPantheress</span> song are <span class="horatio-bold">you?</span></h1>
            <p>Enter a date or Click a Zodiac Sign to find out!</p>
        </div>



        <!--left screen that slides in to show song description-->
        <div class="zodiac-song-description">
            <p><span class="zodiac-style-name" id="zodiac-name"></span>your song is...</p>

            <!--album cover-->
            <img id="album-image" src="" alt="PinkPantheress Album Cover">

            <h3 id="song-name"></h3>
            <p id="album-name"></p>

            <div>
                <div>
                    <img id="zodiac-symbol" src="" alt="zodiac symbol">
                    <p id="zodiac-info"></p>
                </div>
                
                <p id="lyrics"></p>
            </div>

        </div>

        <!--Calander drop down-->
        <div class="calander-input">
            <input type="date" id="birthday-date">

            <!--Enter Button-->
            <button class="Find-Out" id="find-out">FIND OUT!</button>
        </div>

        <!--grid-->
        <div class="zodiac-selection">
            <button id="sagittarius">
                <img src="" alt="">
            </button>

            <button id="capricon">
                <img src="" alt="">
            </button>

            <button id="aquarius">
                <img src="" alt="">
            </button>

            <button id="pisces">
                <img src="" alt="">
            </button>

            <button id="leo">
                <img src="" alt="">
            </button>

            <button id="virgo">
                <img src="" alt="">
            </button>

            <button id="libra">
                <img src="" alt="">
            </button>

            <button id="scorpio">
                <img src="" alt="">
            </button>
            
            <button id="aries">
                <img src="" alt="">
            </button>

            <button id="taurus">
                <img src="" alt="">
            </button>
            
            <button id="gemini">
                <img src="" alt="">
            </button>
            
            <button id="cancer">
                <img src="" alt="">
            </button>

        </div>


    </main>
    
</body>
</html>
